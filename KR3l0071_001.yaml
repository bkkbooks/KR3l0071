body:
  text: 步里客談卷上宋陳長方撰太祖皇帝出兵平江南李煜遣其臣徐鉉來以口舌勝趙普屢言擇館伴及又請乃中批差三班院下名使臣以往鉉反覆問之其人聲喏言不識字而已鉉無如之何也富文忠公少日有詬之者如不聞或問之曰恐罵他人曰斥公名曰富某曰天下安知無同姓名者案此條載説郛本今增入范文正帥西方時相恐其成功入政府欲塞其門故授以邠州觀察使再三以月俸優厚及遣中使宣諭文正力辭以伐其謀竟得請以罷未幾坐擅答李元昊書議加極法降知耀州范忠宣公言江民表作小官時便作取宰相時事舜居歷山及得天下若固有之者養於素也魏泰託梅聖俞之名作書號碧雲騢以詆當世巨公如范文正亦不免其曰范公欲附堂吏范仲之故名仲淹意欲結之為兄弟余於石氏士繇家見之卲康節先天學自李挺之穆伯長相授墓志中云推其源流逺有端緒其實自陳希夷來嘗云天下聰明過人唯程伯淳正叔其次則章惇邢恕可傳此學程先生問幾年可成曰二十年先生曰某兄弟無此等間工夫章邢聞康節語遂來康節視之曰章子厚邢和叔心術不正挾此將何所不為終不與之故先天之學不傳嘗為章子厚筮一卦説平生不差一字熙寧戊申卲堯夫聞杜鵑啼不樂或問之曰將有人起東南為相以文教亂天下此禍非六十年不已未幾王介甫召自江寧介甫所建明經術法令至建炎戊申方熄徐翼之云見一老堂吏言司馬文正在朝堂處置常程事宜有尋常處忽發一事便令人心服外祖林卿云翰林學士趙彥若司馬文正上客也人未嘗見其私謁請問者有事公言之平日隨衆進退而已政和間范文甫建議於廬州湖州取周鼎遂持節過宋解后劉器之請教劉曰君富文忠外孫程正叔門人使某何所措詞田腴承伯云作官從人奏辟非但賔主便有君臣之義不宜輕也初筮仕者求教於劉待制安世曰清明和緩又問何以言緩曰何事不是忙壞却此言固足教初學然學者知道則緩急先後皆不失節矣劉道原恕嘗面折王介甫故子瞻送之詩云孔融不肯讓曹操汲黯本自輕張湯此語蓋詆介甫也吕惠卿附王介甫甚固司馬公言利合必離後果發介甫手簡云無使上知蘇子瞻改鑄顔淵之語曰吾聞覿君子者問雕人不問雕木曰人可雕歟曰吕惠卿雕王安石邢和叔遇人即訓誨時人目曰邢訓吕正獻初喜邢恕聞恕到京訪之旅邸中王伯虎炳之自編修官得帖職章子厚遍問堂中諸人云誰主張吕正獻曰伯虎於例得實上恩也章遂默然元祐中東坡行吕吉甫責詞敘神考初用而中棄之曰先皇帝求賢如不及從善若轉圜始以帝堯之聰姑試伯鯀終焉孔子之聖不信宰豫又曰喜則摩足以相歡怒則反目以相視既而語人云三十年作劊子今日方剮得一箇有肉漢元祐間顧子敦臨為夕郎封駮任情吕汲公大防謀之於吕正獻吕曰遷臨耶躁進者效之責臨耶畏懦者將不敢方今治河之議未決宜遣相河因此賞罰皆非由封駮也陳瑩中答楊中立書云乃欲毁此白麻哭殿庭某謂白麻王言也不可毁天子之庭非哭所也案此原本分為二條而上半段語重當係一條今併蔡京為翰林承旨陳瑩中已言治亂之分在京用否蔡君濟元康問之曰京小人也尤好交結宦者用京與宦者得志天下何以不亂靖康初貶京分司與瑩中贈諫議大夫命齊下案此條又見孫榖祥野老記聞記聞序云先人舊在陳唯室先生講席及見諸所從遊如和靖尹先生之流有野老記聞數篇姑録梗概或原係客談中語也崇寧間立元祐姦黨碑於宣和殿蔡京書立於諸長吏廳事未幾星變一夕大雷雨碎宣和殿碑石遂併諸州者去之人心不以為然而天應之天人無間如此體究可以知道宣和殿所立元祐姦黨碑以司馬溫公為首元祐黨籍固多真儒賢士然蔡京以勢利傾奪錮之鉤黨者亦多矣未必皆君子也余嘗題其後云等是名丹籍誰知品目多蚖龍同在肆玉石共沉河摧折人材盡消磨歲月過厲階生已甚龜鑒莫蹉跎已甚謂吕汲公行事也遊公定夫其子性剛名之以損且曰損君子以懲忿窒欲先賢事事可法孫中丞多內寵夫人以為病縱其尤者犯上孫不能堪去之用此遂數人俱去孫不之悟靖康初金為城下之盟而去唐欽叟少宰引唐自明皇而後屢失而復興者以人主在外可以號召四方力救京師宜舉景德故事下詔出臨洛京以令天下或能大振王略不然亦可還據秦雍以圖興復翌日何栗入對引蘇內翰志林以謂周之失計未有如東遷之甚其議遂格
