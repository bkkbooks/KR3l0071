body:
  text: 提要歩里客談二卷小説家𩔖一雜事之屬臣等謹案歩里客談二卷宋陳長方撰長方字齊之侯官人紹興戊午進士第官江隂軍學教授初長方父侁為洪州錄事卒扵官長方奉母居吳依其外祖太僕寺卿林旦家扵歩里遂以名書宋史藝文志載陳唯室歩里客談一卷唯室即長方之别號宋史差􅍝胡伯能作長方行状稱所著有歩里談錄二卷亦即此書盖初名談錄後乃改今名也所記多嘉祐以来名臣言行而扵熙寧元豐之間邪正是非尤三致意其論元祐黨人不皆君子足破假借標榜之習其引陳瓘與楊時書譏欲裂白麻之非禮亦深明大體所見迥在宋人之上至扵評論文章頗多可采如謂陳師道李杜齊名吾豈敢晚風無𣗳不鳴蟬句與黄庭堅坐對真成被花惱出門一笑大江横句皆學杜甫縛雞行而陳為不𩔖又引王剛中語謂文字使人擊節賞嘆不如使人肅然起敬又謂文章態度如風雲變滅水波成文直因勢而然以議蘇軾數擬盤谷序之非皆為有見至謂月自有光非受日之光一條由不知推歩之術謂胃無左右一條由不知診候之方置之不論可矣此書宋志作一卷與胡伯能状不合盖𫝊寫之誤今㪚見永樂大典者裒而輯之尚得五十八條謹以𩔖排纂從胡伯能所記仍釐為二卷乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:2e445a0aee124ea5db3f60d78bbd2847356be68f826bba9ff093e89cdb59c711
