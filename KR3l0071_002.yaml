body:
  text: 步里客談卷下宋陳長方撰盡心一篇真法言也此孟子晚年言語比之公孫丑等篇無復剛烈之氣伯夷歌云神農虞夏忽然沒兮我安適歸矣陳古刺今用意涵蓄此太史公文筆非伯夷意也韓師德曰史記書韓信之語曰吾悔不用蒯通之計乃為兒女子所詐兒女子指蕭何吕雉也班固略其語曰悔不用蒯通之言死於兒女手殊失本指水上軍鬭入班固刪去亦非也司馬遷作武帝紀實録方士神仙事無一字譏刺使讀者不覺思其事則武帝之愚甚也案此條載說郛本今增入漢武亦善用人末年用金霍及東方朔枚臯司馬相如之徒處之皆得其地但中年宰相皆不擇人太史公有俠氣故於趙奢穰苴儀秦刺客等作傳更得手以未嘗窺聖賢門戶故五帝三王孔子孟子傳記雖補綴事迹亦未盡善案此下二條俱據說郛本增入西漢末文章與文景武帝時小異然文物之盛也無如武帝時將氣有盛衰耶抑由人主所好耶美新不類子雲文字畏死仕莽不敢去後人遂以此汙之君子惡居下流范蔚宗黃憲傳最佳憲初無事迹蔚宗直以語言模寫叔度形容體段使後人見之此最妙處其他傳即馮衍馬援勝蓋得二人文字照映便覺此傳不同以此知班固前書之不可及者亦得太史公司馬相如賈誼董仲舒朝錯劉向諸人文字作底草爾五代史於楊凝式不立傳載其歷梁唐晉漢周以疾致仕又不明其本心凝式諫父涉言大人為唐宰相而以傳國璽與人則其心可見又不仕五代而託心疾其人賢其節髙可知矣余嘗謂自晦與草木共盡者五代不為無人史不得其自者固可歎若凝式本末昭晰史復不書執筆者何其與善之狹也陳師錫伯修作五代史序文詞平平初蘇子瞻以讓曾子固曰歐陽門生中子固先進也子固答曰子瞻不作吾何人哉二公相推未决陳奮筆為之古人作詩斷句輒旁入他意最為警䇿如老杜云雞蟲得失無了時注目寒江倚江閣是也黃魯直作水仙花詩亦用此體云坐對真成花被惱出門一笑大江橫至陳無已云李杜齊名吾豈敢晚風無樹不鳴蟬則直不類矣章叔度憲云每下一俗間言語無一字無來處此陳無已黃魯直作詩法也阿房宫賦只是篇末說秦及六國處佳若丁頭粟粒等語俳優不如余嘗疑三器論非退之文章又疑下邳侯傳是後人擬作退之傳毛頴以文滑稽耳正如伶人作戲初出一諢語滿場皆笑此語蓋再出耶毛頴傳贊賞不酬勞以老見疏秦真少恩哉甚似太史公筆勢董晉行狀書回紇李懷光二事似左氏文字通解非退之文字之乎者也下皆未當其誣退之多矣秦少游云退之元和聖德詩與平淮西碑如出兩手余以歲月考之蓋相去十二年也然以平淮西碑方鄆州溪堂詩則又如他人所作也羅池廟碑古本以涉有新船為步有新船春與猿吟兮秋與鶴飛作秋鶴與飛歐陽永叔以步有新船是而秋鶴與飛為不然說者以是為歐韓文字之分蓋篤論也余嘗以三言評子厚文章曰其大體似紀渻子養鬭雞在中朝時方虛驕而恃氣永州以後猶聽影響栁州以後望之似木雞矣栁子厚先友記乃用孔子七十弟子傳體若真符及雅則以盤誥詩人之文為祖矣東坡辨黃樓賦非代於子由此所謂欲蓋而彰之也卻掃編徐州黃樓東坡所作而子由為之賦東坡自書韓退之畫記東坡以為甲乙帳而秦少游乃效之作五百羅漢記人心之不同如此喻子才道王侍郎剛中語云文字使人擊節賞歎不如使人肅然生敬案此條據說郛本增入張文潛見富鄭公神道碑至論趙濟處曰公文固奇欲加一字可否遂改云及英宗神宗之世公老矣功在史官德在生民北敵西戎視公進退以為中國輕重而一趙濟敢搖之一字固文字關紐也余頃見嘉祐一詔罷茶鹽法讀之數十過不能去手每歎息以為真主言既而觀歐陽文忠集乃歐筆也歐文溫潤尤宜綸誥之詞其言有私藏盜販實繁有徒嚴刑重誅情所不忍是於江湖外數千里設陷穽而陷吾民也東坡志林云嘗欲倣盤谷序作一文字竟不能成態度如風雲變滅水波成文直因勢而然必欲執一時之迹以明定體乃欲繫風捕影也余嘗問王子世云蘇氏為縱橫之學如何曰有之時案上有莊子廟記云只此記中謂莊子於孔氏陽擠而隂助之此語亦縱橫家流也自古稱齊名甚多其實未必然如姚宋則宋之守正非姚比也韓栁元白四人出處邪正不同人言劉白而劉之詩文亦勝白公至如近代歐梅蘇黃而子瞻文章去黃逺甚黃之詩律蘇亦不逮也內外二制以潤色王言布告天下為職一字重輕皆繫國體喜則升之九天怒則擠之九地此為何理要須褒貶之間示有懲戒如駱賔王詆武后讀之但笑至一抔之土未乾六尺之孤安在處乃曰宰相安得失此人武氏猶知此况天下有識之士乎江淮春夏之交多雨其俗謂之梅雨也蓋夏至前後各半月或疑西北不然余謂東南澤國春夏天地氣交水氣上騰遂多雨於理有之或謂月受日之光至望則光滿非也日月內涵隂陽月之隂有時而消長陽亦隨之故光有圓缺至望則月之光自滿適與日望非受日之光沈存中云世多指脾為黃庭非也黃庭有名而無形冲氣也虛而無方物者也又云腎有左右所以為坎離坎離交而滋五藏如乾坤之生六子余謂知脾非黃庭而謂坎離為兩腎何異於紾兄之臂而曰姑徐徐也承平時茶酒班殿侍繫四五重顔色褁肚先是京師以竹盛五色線拽之為戲謂之變線又以殿侍所繫褁肚似之故亦謂之變線今不復繫如許褁肚但有義𢃄數條耳楊宜之侍郎云其前母吕氏舅有為之者古人多用轉蓬竟不知何物外祖林公使遼見蓬花枝葉相屬團欒在地遇風即轉問之云轉蓬也
